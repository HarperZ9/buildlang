name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: compiler
      - name: Clippy
        working-directory: compiler
        run: cargo clippy -- -D clippy::correctness -A clippy::complexity -A clippy::style -A clippy::pedantic -A clippy::perf
      - name: Format check
        working-directory: compiler
        run: cargo fmt --check

  test:
    runs-on: ${{ matrix.os }}
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: compiler
      - name: Run tests
        working-directory: compiler
        run: cargo test -- --skip spirv::tests::test_triangle --skip spirv::tests::test_write
      - name: Build release
        working-directory: compiler
        run: cargo build --release
      - name: Compile .bld test programs (end-to-end proof)
        shell: bash
        run: |
          BUILDC="compiler/target/release/buildc"
          if [ "$RUNNER_OS" = "Windows" ]; then BUILDC="${BUILDC}.exe"; fi

          pass=0; fail=0
          for f in tests/programs/01_hello.bld \
                   tests/programs/02_variables.bld \
                   tests/programs/03_functions.bld \
                   tests/programs/06_recursion.bld \
                   tests/programs/08_arithmetic.bld \
                   tests/programs/11_structs.bld \
                   tests/programs/16_closures.bld \
                   tests/programs/27_effects_showcase.bld \
                   tests/programs/46_color_science.bld \
                   tests/programs/68_hashmap.bld; do
            if $BUILDC "$f" --target c -o /dev/null 2>/dev/null; then
              echo "PASS: $(basename $f)"
              pass=$((pass + 1))
            else
              echo "FAIL: $(basename $f)"
              fail=$((fail + 1))
            fi
          done
          echo ""
          echo "=== $pass passed / $fail failed ==="
          if [ "$fail" -gt 0 ]; then exit 1; fi
      - name: Negative tests (must be REJECTED by compiler)
        shell: bash
        run: |
          BUILDC="compiler/target/release/buildc"
          if [ "$RUNNER_OS" = "Windows" ]; then BUILDC="${BUILDC}.exe"; fi

          neg_pass=0; neg_fail=0

          # Type mismatch
          echo 'fn main() { let x: i32 = "hello"; }' > /tmp/neg_type.bld
          if ! $BUILDC /tmp/neg_type.bld --target c -o /dev/null 2>/dev/null; then
            echo "  REJECT OK: type mismatch"; neg_pass=$((neg_pass + 1))
          else
            echo "  BUG: accepted type mismatch"; neg_fail=$((neg_fail + 1))
          fi

          # Undefined variable
          echo 'fn main() { let y = x + 1; }' > /tmp/neg_undef.bld
          if ! $BUILDC /tmp/neg_undef.bld --target c -o /dev/null 2>/dev/null; then
            echo "  REJECT OK: undefined variable"; neg_pass=$((neg_pass + 1))
          else
            echo "  BUG: accepted undefined variable"; neg_fail=$((neg_fail + 1))
          fi

          # Wrong arg count
          echo 'fn add(a: i32, b: i32) -> i32 { a + b } fn main() { add(1); }' > /tmp/neg_args.bld
          if ! $BUILDC /tmp/neg_args.bld --target c -o /dev/null 2>/dev/null; then
            echo "  REJECT OK: wrong arg count"; neg_pass=$((neg_pass + 1))
          else
            echo "  BUG: accepted wrong arg count"; neg_fail=$((neg_fail + 1))
          fi

          # Return type mismatch
          echo 'fn get() -> i32 { "not a number" } fn main() { get(); }' > /tmp/neg_ret.bld
          if ! $BUILDC /tmp/neg_ret.bld --target c -o /dev/null 2>/dev/null; then
            echo "  REJECT OK: return type mismatch"; neg_pass=$((neg_pass + 1))
          else
            echo "  BUG: accepted return type mismatch"; neg_fail=$((neg_fail + 1))
          fi

          echo ""
          echo "=== Negative tests: $neg_pass rejected / $neg_fail accepted ==="
          if [ "$neg_fail" -gt 0 ]; then exit 1; fi
      - name: End-to-end verification (compile + run + self-check)
        if: runner.os == 'Linux'
        shell: bash
        run: |
          BUILDC="compiler/target/release/buildc"

          # Compile color_test.bld → C → binary → run
          echo "=== color_test.bld: full pipeline ==="
          $BUILDC tests/programs/color_test.bld --target c -o /tmp/color_test.c
          gcc -O2 -o /tmp/color_test /tmp/color_test.c -lm
          /tmp/color_test
          if [ $? -ne 0 ]; then
            echo "FAIL: color_test binary returned nonzero"
            exit 1
          fi
          echo "=== Self-verifying test PASSED ==="

          # Cross-module import test: compile + run
          echo "=== cross_module_test.bld: mod geometry import ==="
          $BUILDC tests/programs/cross_module_test.bld --target c -o /tmp/cross_module_test.c
          gcc -O2 -o /tmp/cross_module_test /tmp/cross_module_test.c -lm
          /tmp/cross_module_test
          if [ $? -ne 0 ]; then
            echo "FAIL: cross_module_test binary returned nonzero"
            exit 1
          fi
          echo "=== Cross-module import test PASSED ==="
