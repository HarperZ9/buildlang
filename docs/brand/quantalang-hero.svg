<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 520" role="img" aria-label="QuantaLang README hero for the Quanta ecosystem. Typed effects in, verified C out.">
  <title>QuantaLang hero</title>
  <desc>QuantaLang README hero for the Quanta ecosystem. Typed effects in, verified C out across eight codegen backends.</desc>
  <rect width="1280" height="520" rx="34" fill="#f4f3ef"/>
  <path d="M80 96 H1200 M80 424 H1200" stroke="#0b0c0e" stroke-opacity=".14"/>
